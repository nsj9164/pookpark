<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coop Park - 친구랑 협동 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 로비 화면 -->
  <div id="lobby" class="screen">
    <div class="card">
      <h1>🎮 Coop Park</h1>
      <p class="sub">친구를 URL로 초대해서 같이 하는 협동 게임</p>

      <label>닉네임</label>
      <input id="nameInput" maxlength="12" placeholder="이름을 입력하세요" />

      <div id="charSelect" class="hidden">
        <label>캐릭터 <span class="hiddenTag">✨ 히든</span></label>
        <div id="charGrid"></div>
      </div>

      <div class="row">
        <button id="createBtn" class="primary">새 방 만들기</button>
      </div>

      <div class="divider"><span>또는 코드로 입장</span></div>

      <div class="row">
        <input id="codeInput" maxlength="4" placeholder="방 코드 (예: ABCD)" style="text-transform:uppercase" />
        <button id="joinBtn">입장</button>
      </div>

      <p id="lobbyMsg" class="msg"></p>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="game" class="screen hidden">
    <div id="topbar">
      <div class="roominfo">
        방 코드: <b id="roomCode">----</b>
        <button id="shareBtn" class="small">🔗 초대 링크 복사</button>
        <span id="copyToast" class="toast"></span>
      </div>
      <div id="levelInfo"></div>
    </div>

    <canvas id="canvas" width="960" height="540"></canvas>

    <div id="hint">
      이동: <b>← →</b> / <b>A D</b> &nbsp;·&nbsp; 점프: <b>↑ / W / Space</b> &nbsp;·&nbsp; 버블 발사: <b>F</b> (스테이지당 5발)
      <br>친구 <b>머리를 밟고</b> 높은 곳으로 (같이 이동!) &nbsp;·&nbsp; <b>버블</b>에 갇히면 <b>스페이스</b>로 탈출 &nbsp;·&nbsp; 모두 열쇠 먹고 <b>문</b>으로!
    </div>
  </div>

  <!-- 전체 클리어 승리 화면 -->
  <div id="winScreen" class="hidden">
    <div class="winCard">
      <div class="winEmoji">🎉🏆🎉</div>
      <h1>전체 클리어!!!</h1>
      <p class="sub">리얼 보스까지 다 깼어요! 최고의 팀워크 👏</p>
      <p id="winStats" class="winStats"></p>
      <button id="restartBtn" class="primary">처음부터 다시</button>
    </div>
  </div>

  <script type="module" src="client.js"></script>
</body>
</html>
